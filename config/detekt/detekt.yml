build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false

complexity:
  active: true
  CyclomaticComplexMethod:
    threshold: 35
  LongMethod:
    threshold: 300
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 9
  TooManyFunctions:
    thresholdInFiles: 20

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/preview/**']
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  MatchingDeclarationName:
    active: false

performance:
  active: true

potential-bugs:
  active: true
  NullCheckOnMutableProperty:
    active: true

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
  ReturnCount:
    max: 3
  WildcardImport:
    active: false
  MagicNumber:
    active: false

formatting:
  active: false
  android: true
  autoCorrect: true
